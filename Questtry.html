<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Окей • Квест</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nosifer&display=swap');
        body { margin:0; padding:0; color:#fff; text-align:center; font-family:'Nosifer',cursive; background-image:url('https://github.com/f22raf/my-music-site/raw/main/1746449062889.jpg'); background-size:cover; background-position:center; min-height:100vh; font-size:1.2em; text-shadow:1px 1px 0 #000,2px 2px 0 #333; }
        .container { max-width:720px; margin:20px auto; padding:25px; background:rgba(0,0,0,0.65); border:3px solid #ff0000; }
        .group-name { font-size:2.4em; color:#ff004f; margin:10px 0; text-shadow:2px 2px 0 #000,4px 4px 0 #ff2200; }
        h2 { color:#ffcc00; margin:22px 0 14px; font-size:1.9em; letter-spacing:1px; }
        .question { color:#fff; margin:15px 0; font-size:1.1em; line-height:1.4; }
        input { background:#111; border:2px solid #ff004f; color:#fff; padding:12px; width:80%; margin:10px auto; font-family:'Nosifer',cursive; font-size:1.1em; text-align:center; display:block; border-radius:0; box-shadow:0 3px 0 #000; }
        input:focus { outline:none; border-color:#ffcc00; }
        .btn { display:inline-block; padding:10px 20px; margin:10px; color:white; text-decoration:none; border:2px solid #ff0000; background:#ff004f; font-family:'Nosifer',cursive; font-size:1.3em; min-width:140px; transition:transform 0.1s; }
        .btn:hover { transform:translateX(3px) translateY(3px); box-shadow:3px 3px 0 #000; }
        .card { border:4px double #ffcc00; padding:20px; background:rgba(139,0,0,0.3); margin:25px 0; box-shadow:0 0 15px #ffcc00,0 4px 0 #000; animation:glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow:0 0 10px #ffcc00,0 4px 0 #000; } to { box-shadow:0 0 25px #ffcc00,0 4px 0 #000; } }
        .card-img { width:100%; max-width:280px; border:3px solid #ff004f; margin:0 auto 15px; display:block; box-shadow:0 4px 0 #000; }
        .card-text { color:#ffcc00; margin:5px 0; font-size:1.2em; text-shadow:2px 2px 0 #000; }
        .warn { background:rgba(139,0,0,0.3); border-left:4px solid #ff004f; padding:15px; margin:25px 0; font-size:0.9em; color:#fff; text-align:left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="group-name">Окей</div>
        <h2>🎸 КВЕСТ ДЛЯ ФАНБАЗЫ 🎸</h2>
        <div id="content">
            <p class="question">Дата основания группы:</p>
            <input type="password" id="pass" placeholder="ДДММГГГГ" maxlength="8">
            <br>
            <a href="#" class="btn" onclick="go()">ВВОД</a>
        </div>
    </div>

    <script>
        let isTestMode = false;
        let currentQuestions = [];
        
        // 🃏 20 карт (10 уникальных × 2 экз.) — коллекции №5 и №6
        const cards = [
            {img:"Cards/InShot_20260208_021444024.jpg", номер:1, экз:5},
            {img:"Cards/InShot_20260208_022242270.jpg", номер:2, экз:5},
            {img:"Cards/InShot_20260208_022506814.jpg", номер:3, экз:5},
            {img:"Cards/InShot_20260208_023708134.jpg", номер:4, экз:5},
            {img:"Cards/InShot_20260208_024434872.jpg", номер:5, экз:5},
            {img:"Cards/InShot_20260208_024852106.jpg", номер:6, экз:5},
            {img:"Cards/InShot_20260208_025430478.jpg", номер:7, экз:5},
            {img:"Cards/InShot_20260208_025808772.jpg", номер:8, экз:5},            {img:"Cards/InShot_20260208_030521457.jpg", номер:9, экз:5},
            {img:"Cards/InShot_20260208_031058054.jpg", номер:10, экз:5},
            {img:"Cards/InShot_20260208_021444024.jpg", номер:1, экз:6},
            {img:"Cards/InShot_20260208_022242270.jpg", номер:2, экз:6},
            {img:"Cards/InShot_20260208_022506814.jpg", номер:3, экз:6},
            {img:"Cards/InShot_20260208_023708134.jpg", номер:4, экз:6},
            {img:"Cards/InShot_20260208_024434872.jpg", номер:5, экз:6},
            {img:"Cards/InShot_20260208_024852106.jpg", номер:6, экз:6},
            {img:"Cards/InShot_20260208_025430478.jpg", номер:7, экз:6},
            {img:"Cards/InShot_20260208_025808772.jpg", номер:8, экз:6},
            {img:"Cards/InShot_20260208_030521457.jpg", номер:9, экз:6},
            {img:"Cards/InShot_20260208_031058054.jpg", номер:10, экз:6}
        ];

        // 🚫 Карты, исключённые из розыгрыша (по запросу)
        const manuallyExcluded = [
            // Экземпляр 5/6
            {img:"Cards/InShot_20260208_022242270.jpg", номер:2, экз:5},
            {img:"Cards/InShot_20260208_022506814.jpg", номер:3, экз:5},
            {img:"Cards/InShot_20260208_023708134.jpg", номер:4, экз:5},
            {img:"Cards/InShot_20260208_025430478.jpg", номер:7, экз:5},
            // Экземпляр 6/6
            {img:"Cards/InShot_20260208_021444024.jpg", номер:1, экз:6},
            {img:"Cards/InShot_20260208_022242270.jpg", номер:2, экз:6},
            {img:"Cards/InShot_20260208_023708134.jpg", номер:4, экз:6},
            {img:"Cards/InShot_20260208_024434872.jpg", номер:5, экз:6}
        ];

        // ❓ 12 вопросов
        const questionBank = [
            { q: "Кто в группе играет на бас-гитаре?", a: ["томас"] },
            { q: "Сколько раз из 12 выступлений была сыграна 'Изумрудный Город'?", a: ["11"] },
            { q: "Автор какой песни Окей является Лёха Панк?", a: ["степная трава"] },
            { q: "Какая фамилия у Ротгара?", a: ["михайлов"] },
            { q: "Кто написал песню 'Юрский Движ'?", a: ["ковбой раф евро", "раф евро", "ковбой раф"] },
            { q: "Какая акустическая гитара была у Белого Джинна в Окей?", a: ["colombo", "колумбо", "коломбо"] },
            { q: "Кем был Птеро до Окей?", a: ["ковидный"] },
            { q: "В каком году Томас пришёл в Окей?", a: ["2025"] },
            { q: "На каком инструменте изначально игралось соло в 'Изумрудный Город'?", a: ["флейта"] },
            { q: "Как называется путь от Временного Рейнджера Стража до Окейтозавра?", a: ["калифорнийская тропа"] },
            { q: "Сколько рук у Ковбоя Рафа Евро?", a: ["2", "две"] },
            { q: "Какая электроакустическая гитара была у Клауса в Окей?", a: ["martinez", "мартинез"] }
        ];

        function getRandomQuestions() {
            return [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 3);
        }

        function normalize(str) {
            return str.trim().toLowerCase().replace(/ё/g, 'е');        }

        function checkAnswer(user, correct) {
            const norm = normalize(user);
            return correct.some(a => norm.includes(normalize(a)));
        }

        // 🔒 Проверка и сброс "зависшего" флага при загрузке
        window.addEventListener('load', () => {
            const claiming = localStorage.getItem('quest_claiming');
            if (claiming === 'true') {
                localStorage.removeItem('quest_claiming');
            }
        });

        function go() {
            const p = document.getElementById('pass').value;
            if (p === '00000000') {
                isTestMode = true;
                startQuiz();
            } else if (p === '26082022') {
                const last = localStorage.getItem('quest_time');
                if (last && Date.now() - last < 86400000) {
                    alert('⏳ Уже проходил квест! Следующая попытка завтра.');
                    return;
                }
                isTestMode = false;
                startQuiz();
            } else {
                alert('❌ Птеро уже вылетел за тобой!');
            }
        }

        function startQuiz() {
            currentQuestions = getRandomQuestions();
            let html = currentQuestions.map((q, i) => 
                `<p class="question">${i+1}. ${q.q}</p><input type="text" id="a${i+1}" placeholder="...">`
            ).join('');
            html += `<br><a href="#" class="btn" onclick="check()">ОТВЕТИТЬ</a>`;
            document.getElementById('content').innerHTML = html;
        }

        function check() {
            // 🔒 Блокировка повторной отправки (race condition fix)
            if (localStorage.getItem('quest_claiming') === 'true') {
                alert('⏳ Карта уже выдаётся!');
                return;
            }
            
            const answers = [1,2,3].map(i => document.getElementById(`a${i}`).value);            if (!currentQuestions.every((q, i) => checkAnswer(answers[i], q.a))) {
                alert('❌ Ошибка в ответах! Иди учи лор на главной.');
                location.reload();
                return;
            }

            // 🔒 Устанавливаем флаг блокировки
            localStorage.setItem('quest_claiming', 'true');
            
            const used = isTestMode ? [] : JSON.parse(localStorage.getItem('quest_used') || '[]');
            
            // ➕ Добавляем вручную исключённые карты в used
            manuallyExcluded.forEach(exclCard => {
                const idx = cards.findIndex(c => 
                    c.img === exclCard.img && 
                    c.номер === exclCard.номер && 
                    c.экз === exclCard.экз
                );
                if (idx !== -1 && !used.includes(idx)) {
                    used.push(idx);
                }
            });
            
            const available = cards.filter((_, i) => !used.includes(i));
            
            if (!isTestMode && available.length === 0) {
                localStorage.removeItem('quest_claiming');
                alert('🎉 Все карты разыграны!');
                location.href = 'index.html';
                return;
            }

            const randIdx = Math.floor(Math.random() * available.length);
            const card = available[randIdx];
            const globalIdx = cards.findIndex(c => c.img === card.img && c.номер === card.номер && c.экз === card.экз);

            if (!isTestMode) {
                used.push(globalIdx);
                localStorage.setItem('quest_used', JSON.stringify(used));
                localStorage.setItem('quest_time', Date.now().toString());
                localStorage.setItem('quest_last_card', globalIdx.toString());
            }

            // 🔓 Снимаем блокировку
            localStorage.removeItem('quest_claiming');
            
            show(card);
        }
        
        function show(card) {            document.getElementById('content').innerHTML = `
                <div class="card">
                    <img src="${card.img}" class="card-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 width=%27280%27 height=%27380%27><rect width=%27280%27 height=%27380%27 fill=%27%23222%27/><text x=%2750%27 y=%27200%27 fill=%27%23ff004f%27 font-size=%2724%27>КАРТА</text></svg>'">
                    <div class="card-text">Коллекционная карточка Окей!</div>
                    <div class="card-text" style="color:#ff004f; font-size:1.1em;">${card.номер}/10, Экз. ${card.экз}/6</div>
                </div>
                <div class="warn">
                    <strong>⚠️ СКРИНШОТ!</strong><br>
                    Пиши Ковбою Рафу за физической картой.<br>
                    (Только Челябинск!)
                </div>
                <a href="index.html" class="btn" style="border-color:#4c75a8;background:#4c75a8;">← НА ГЛАВНУЮ</a>
            `;
        }
    </script>
</body>
</html>
